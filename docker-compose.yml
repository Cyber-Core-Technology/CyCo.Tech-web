services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: cycotech-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CONTACT_EMAIL=${CONTACT_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    networks:
      - cycotech_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cycotech_net:
    external: true
